version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: stl_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: stl_viewer_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: stl_server
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=rootpassword
      - DB_NAME=stl_viewer_db
      - JWT_SECRET=super_secret_key_change_me_in_prod
    depends_on:
      - db

  client:
    build: ./client
    container_name: stl_client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server